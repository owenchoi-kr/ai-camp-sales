<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Day 2 · 03 마무리</title>
<link rel="stylesheet" href="./assets/warm-neutral.css">
<style>
  body { display: flex; flex-direction: column; }
  .blocks { display: grid; grid-template-columns: 1fr 1fr; gap: 14pt; flex: 1; margin-top: 24pt; }
  .blk { padding: 26pt 24pt; border-radius: 12pt; background: #ebe1d2; display: flex; flex-direction: column; gap: 12pt; }
  .blk.terra { background: #c56a4a; color: #f7efe4; }
  .blk .tag { font-size: 10pt; letter-spacing: 0.14em; font-weight: 700; color: #b45a34; text-transform: uppercase; }
  .blk.terra .tag { color: #ffd9bf; }
  .blk .body { font-size: 18pt; font-weight: 700; color: #2b2520; line-height: 1.3; margin-top: auto; }
  .blk.terra .body { color: #fff; }
</style>
</head>
<body>
  <div class="eyebrow">마무리</div>
  <div class="h-large">오늘 만든 것</div>
  <div class="rule"></div>

  <div class="blocks">
    <div class="blk terra">
      <div class="tag">오늘 만든 것</div>
      <div class="body">4개 소스가 붙은 my-account-sync</div>
    </div>
    <div class="blk">
      <div class="tag">내일</div>
      <div class="body">이 브리핑 위에서 도는 업무 스킬</div>
    </div>
  </div>
</body>
</html>

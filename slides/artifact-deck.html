<style>

  h1{font-size:34px;font-weight:800;letter-spacing:-0.02em;margin-top:14px;text-wrap:balance;}

  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:24px;cursor:pointer;transition:transform .15s,border-color .15s,background .15s;text-align:left;color:inherit;font:inherit;display:flex;flex-direction:column;gap:8px;min-height:132px;}
  .card:hover{background:var(--card-h);border-color:var(--accent);transform:translateY(-3px);}
  .card:focus-visible{outline:2px solid var(--accent);outline-offset:3px;}
  .card .k{font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:var(--accent);font-weight:700;}
  .card .t{font-size:20px;font-weight:700;}
  .card .s{color:var(--muted);font-size:13px;line-height:1.4;margin-top:auto;}
  .card .n{color:var(--muted);font-size:12px;font-variant-numeric:tabular-nums;}
  .foot{margin-top:48px;padding-top:24px;border-top:1px solid var(--line);color:var(--muted);font-size:13px;line-height:1.7;}

  .bar{height:52px;display:flex;align-items:center;gap:14px;padding:0 18px;border-bottom:1px solid var(--line);flex-shrink:0;}

에 열고 나는 언제든 고쳐서 같은 링크로 갱신한다.</div>\n    <div class=\"callout\"><strong>PDF는 보내는 순간 굳는다.</strong> 링크는 계속 살아있다.</div>\n  </div>\n</body>\n</html>\n"]}];
const grid=document.getElementById('grid'),viewer=document.getElementById('viewer'),frame=document.getElementById('frame');
const vTtl=document.getElementById('v-ttl'),vCnt=document.getElementById('v-cnt'),scaler=document.getElementById('scaler');
const bPrev=document.getElementById('b-prev'),bNext=document.getElementById('b-next');
let dIdx=0,sIdx=0;
DECKS.forEach((d,i)=>{
  const b=document.createElement('button');b.className='card';
  b.innerHTML=`<div class="k">${d.count}장</div><div class="t">${d.title}</div><div class="s">${d.sub}</div>`;
  b.onclick=()=>openDeck(i);grid.appendChild(b);
});
function openDeck(i){dIdx=i;sIdx=0;viewer.classList.add('on');render();fit();}
function closeDeck(){viewer.classList.remove('on');}
function render(){
  const d=DECKS[dIdx];frame.srcdoc=d.slides[sIdx];
  vTtl.textContent=d.title;vCnt.textContent=`${sIdx+1} / ${d.count}`;
  bPrev.disabled=sIdx===0;bNext.disabled=sIdx===d.count-1;
}
function go(n){const d=DECKS[dIdx];const t=sIdx+n;if(t<0||t>=d.count)return;sIdx=t;render();}
function fit(){const st=document.querySelector('.stage').getBoundingClientRect();const s=Math.min((st.width-40)/960,(st.height-40)/540);scaler.style.transform=`scale(${s})`;}
bPrev.onclick=()=>go(-1);bNext.onclick=()=>go(1);document.getElementById('b-home').onclick=closeDeck;
document.addEventListener('keydown',e=>{
  if(!viewer.classList.contains('on'))return;
  if(e.key==='ArrowLeft')go(-1);
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();go(1);}
  if(e.key==='Escape')closeDeck();
});
window.addEventListener('resize',fit);
</script>

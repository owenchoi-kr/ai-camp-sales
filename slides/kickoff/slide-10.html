<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Day 1 · I07 Stage 2</title>
<link rel="stylesheet" href="./assets/warm-neutral.css">
<style>
  body { background: #c56a4a; color: #f7efe4; display: flex; flex-direction: column; }
  .eyebrow { color: #ffd9bf; }
  .h-large { color: #fff; }
  .h-large em { color: #ffd9bf; }
  .rule { background: #ffd9bf; }
  .stage { display: grid; grid-template-columns: 1fr 1fr; gap: 16pt; flex: 1; margin-top: 22pt; }
  .card { padding: 22pt 22pt; border-radius: 12pt; background: rgba(255,255,255,0.1); display: flex; flex-direction: column; gap: 14pt; justify-content: center; }
  .tag { font-size: 9pt; letter-spacing: 0.22em; font-weight: 700; color: #ffd9bf; text-transform: uppercase; }
  .card h3 { font-size: 18pt; font-weight: 700; color: #fff; line-height: 1.25; }
  .lead-line { font-size: 13pt; line-height: 1.45; color: #f5e4d4; }
  .lead-line strong { color: #fff; font-weight: 700; }
  .pieces { display: flex; flex-wrap: wrap; gap: 6pt; }
  .pieces .piece { font-size: 11pt; padding: 6pt 11pt; background: rgba(255,255,255,0.18); border-radius: 999pt; color: #fff; font-family: 'SF Mono', monospace; font-weight: 700; }
</style>
</head>
<body>
  <div class="eyebrow">Stage 2 · OS 빌더</div>
  <div class="h-large">AI 위에 <em>내 환경</em>을 짓는다</div>
  <div class="rule"></div>

  <div class="stage">
    <div class="card">
      <div class="tag">비유 · 컴퓨터 OS에 내 환경 깔기</div>
      <h3>맥락이 자동으로 공급된다</h3>
      <div class="lead-line"><strong>같은 지시 두 번 안 한다.</strong><br>맥락은 환경이 알아서 깐다.</div>
    </div>

    <div class="card">
      <div class="tag">무엇을 까는가</div>
      <h3>"내 환경"의 부품들</h3>
      <div class="pieces">
        <div class="piece">맥락 파일</div>
        <div class="piece">규칙</div>
        <div class="piece">반복 도구</div>
        <div class="piece">외부 연결</div>
        <div class="piece">자동화</div>
        <div class="piece">기억</div>
      </div>
      <div class="lead-line">4일 캠프가 다루는 6축 = 이 부품들.</div>
    </div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Day 1 · I03 잘 쓰는 사람</title>
<link rel="stylesheet" href="./assets/warm-neutral.css">
<style>
  body { display: flex; flex-direction: column; }
  .verbal { margin-top: 20pt; padding: 12pt 16pt; background: #2b2520; border-radius: 8pt; display: flex; gap: 16pt; align-items: center; }
  .verbal .left { flex: 1; }
  .verbal .lbl { font-size: 8.5pt; letter-spacing: 0.22em; font-weight: 700; color: #ffd9bf; text-transform: uppercase; }
  .verbal .quote { font-size: 13pt; color: #fff; font-weight: 700; line-height: 1.4; margin-top: 4pt; }
  .verbal .quote em { font-style: normal; color: #ffd9bf; }
  .three-points { display: flex; flex-direction: column; gap: 9pt; margin-top: 14pt; flex: 1; justify-content: center; }
  .point { display: flex; gap: 16pt; align-items: center; padding: 13pt 18pt; background: #ebe1d2; border-radius: 10pt; }
  .point .num { font-size: 20pt; font-weight: 700; color: #b45a34; min-width: 32pt; font-family: 'SF Mono', monospace; }
  .point .body { display: flex; flex-direction: column; gap: 3pt; }
  .point .body .head { font-size: 14pt; font-weight: 700; color: #2b2520; line-height: 1.3; }
  .point .body .desc { font-size: 10.5pt; color: #7d6b5a; line-height: 1.4; }
  .quote-cite { font-size: 9pt; color: #a0917e; margin-top: 6pt; font-style: italic; text-align: right; }
</style>
</head>
<body>
  <div class="eyebrow">잘 쓰는 사람의 차이</div>
  <div class="h-large">"딸깍"이 아니라, <em>AI랑 워크플로우를 같이 짠다</em></div>
  <div class="rule"></div>

  <div class="verbal">
    <div class="left">
      <div class="lbl">잘 쓰는 사람 ≠</div>
      <div class="quote">단순 자동화 딸깍 충 · ChatGPT 답 받아쓰는 사람</div>
    </div>
    <div class="left">
      <div class="lbl">잘 쓰는 사람 =</div>
      <div class="quote"><em>AI를 OS로 보고</em>, 그 위에 환경을 짓는 사람</div>
    </div>
  </div>

  <div class="three-points">
    <div class="point">
      <div class="num">1</div>
      <div class="body">
        <div class="head">암묵지 명시화</div>
        <div class="desc">머릿속에만 있던 "당연한 것"을 꺼내, AI가 읽을 수 있게 만든다.</div>
      </div>
    </div>
    <div class="point">
      <div class="num">2</div>
      <div class="body">
        <div class="head">Unknown Unknowns 캐치</div>
        <div class="desc">내가 모르는지조차 몰랐던 영역을, AI 질문을 통해 발견한다.</div>
      </div>
    </div>
    <div class="point">
      <div class="num">3</div>
      <div class="body">
        <div class="head">피드백 루프 설계</div>
        <div class="desc">한 번이 아니라, 결과 → 검토 → 개선이 자동으로 도는 구조.</div>
      </div>
    </div>
  </div>
</body>
</html>

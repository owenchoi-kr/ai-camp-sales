<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Kickoff · I04 암묵지의 명시화</title>
<link rel="stylesheet" href="./assets/warm-neutral.css">
<style>
  body { display: flex; flex-direction: column; }
  .lead { font-size: 13pt; line-height: 1.55; color: #7d6b5a; margin-top: 14pt; max-width: 560pt; }
  .boxes { display: grid; grid-template-columns: 1fr 1fr; gap: 14pt; margin-top: auto; }
  .box { border-radius: 12pt; padding: 16pt 18pt; display: flex; flex-direction: column; gap: 8pt; }
  .box.cream { background: #ebe1d2; }
  .box.dark { background: #2b2520; }
  .box .lbl { font-size: 9pt; letter-spacing: 0.22em; font-weight: 700; text-transform: uppercase; }
  .box.cream .lbl { color: #b45a34; }
  .box.dark .lbl { color: #ffd9bf; }
  .box.cream .txt { font-size: 11.5pt; line-height: 1.5; color: #2b2520; }
  .box.dark .txt { font-size: 11.5pt; line-height: 1.5; color: #f5e4d4; }
  .box.dark .txt em { font-style: normal; color: #f2a97e; font-weight: 700; }
</style>
</head>
<body>
  <div class="eyebrow">AI랑 워크플로우 짜기 · 1 / 3</div>
  <div class="h-large">머릿속 판단 기준을 <em>글로 꺼낸다</em></div>
  <div class="rule"></div>

  <div class="lead">"그냥 이렇게 하는 거지"로 넘기던 판단을 규칙으로 적어야 AI에게 맡길 수 있다. 내 업무 로직을 글과 시스템으로 정리하는 것이 첫 단추다.</div>

  <div class="boxes">
    <div class="box cream">
      <div class="lbl">예시</div>
      <div class="txt">리드 스코어링을 "회사 이메일이면 +점, 스팸 패턴이면 자동 탈락"으로 명시하자, 주 15시간 걸리던 일이 0이 됐다.</div>
    </div>
    <div class="box dark">
      <div class="lbl">이 캠프에서</div>
      <div class="txt"><em>Day 1</em> — 내 계정·톤·금지어를 CLAUDE.md에 적는다 · <em>Day 3</em> — 반복 작업을 템플릿 스킬로 만든다</div>
    </div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Day 1 · I05 Stage 0</title>
<link rel="stylesheet" href="./assets/warm-neutral.css">
<style>
  body { display: flex; flex-direction: column; }
  .stage { display: grid; grid-template-columns: 1fr 1fr; gap: 16pt; flex: 1; margin-top: 22pt; }
  .card { padding: 22pt 22pt; border-radius: 12pt; background: #ebe1d2; display: flex; flex-direction: column; gap: 12pt; justify-content: center; }
  .tag { font-size: 9pt; letter-spacing: 0.22em; font-weight: 700; color: #a0917e; text-transform: uppercase; }
  .card h3 { font-size: 18pt; font-weight: 700; color: #2b2520; line-height: 1.25; }
  .lead-line { font-size: 13pt; color: #42332a; line-height: 1.4; }
  .lead-line strong { color: #b45a34; font-weight: 700; }
  .pill { font-size: 11pt; padding: 7pt 12pt; background: #f5ede2; border: 1px dashed #d4c4ac; border-radius: 999pt; color: #42332a; display: inline-block; align-self: flex-start; font-weight: 600; }
  .example { padding: 12pt 14pt; background: #f5ede2; border-radius: 8pt; font-size: 11pt; line-height: 1.5; color: #42332a; }
  .example strong { color: #b45a34; font-weight: 700; }
</style>
</head>
<body>
  <div class="eyebrow">Stage 0 · 앱 사용자</div>
  <div class="h-large">묻고, <em>그대로</em> 쓴다</div>
  <div class="rule"></div>

  <div class="stage">
    <div class="card">
      <div class="tag">비유 · 계산기 앱</div>
      <h3>켜고, 묻고, 닫는다</h3>
      <div class="lead-line">매번 맥락을 다시 설명한다.<br><strong>복리가 없다.</strong></div>
      <div class="pill">⚠ 검토 빠지면 받는 사람 책상으로</div>
    </div>

    <div class="card">
      <div class="tag">예시 · "리캡 메일 써줘"</div>
      <h3>일반 템플릿이 나온다</h3>
      <div class="example">
        톤 ✗ · 금지어 ✗ · 고객 맥락 ✗<br><br>
        <strong>→ 직접 다 고친다.</strong><br>
        <strong>→ 다음 메일 때 또 처음부터.</strong>
      </div>
    </div>
  </div>
</body>
</html>

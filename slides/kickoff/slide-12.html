<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Day 1 · I09 ChatGPT vs Claude Code</title>
<link rel="stylesheet" href="./assets/warm-neutral.css">
<style>
  body { display: flex; flex-direction: column; }
  .table { display: grid; grid-template-columns: 0.7fr 1fr 1fr; gap: 1pt; flex: 1; margin-top: 22pt; background: #d4c4ac; border-radius: 12pt; overflow: hidden; }
  .cell { padding: 13pt 16pt; background: #ebe1d2; font-size: 12pt; line-height: 1.4; color: #42332a; display: flex; flex-direction: column; gap: 4pt; justify-content: center; font-weight: 600; }
  .cell.head { background: #2b2520; color: #f5e4d4; font-weight: 700; font-size: 13pt; letter-spacing: 0.05em; }
  .cell.head.terra { background: #c56a4a; color: #fff; }
  .cell.head .sub { font-size: 9pt; letter-spacing: 0.18em; color: #a0917e; font-weight: 700; margin-top: 3pt; text-transform: uppercase; }
  .cell.head.terra .sub { color: #ffd9bf; }
  .cell.label { background: #f5ede2; font-weight: 700; color: #b45a34; font-size: 9pt; letter-spacing: 0.18em; text-transform: uppercase; }
  .cell strong { color: #2b2520; font-weight: 700; }
  .closing { margin-top: 14pt; padding: 11pt 16pt; background: #ebe1d2; border-left: 3px solid #c56a4a; border-radius: 6pt; font-size: 12pt; line-height: 1.5; color: #2b2520; font-weight: 600; }
  .closing strong { color: #b45a34; }
</style>
</head>
<body>
  <div class="eyebrow">도구는 도구일 뿐</div>
  <div class="h-large">OS 환경을 짓는 데는 <em>다른 도구</em>가 필요하다</div>
  <div class="rule"></div>

  <div class="table">
    <div class="cell head"></div>
    <div class="cell head">ChatGPT<div class="sub">앱</div></div>
    <div class="cell head terra">Claude Code<div class="sub">OS 빌더</div></div>

    <div class="cell label">맥락</div>
    <div class="cell">매번 다시 붙여넣기</div>
    <div class="cell"><strong>자동 로드</strong></div>

    <div class="cell label">접근</div>
    <div class="cell">웹 안에서만</div>
    <div class="cell"><strong>내 파일·도구·외부 연결</strong></div>

    <div class="cell label">실행</div>
    <div class="cell">한 번 묻고 한 번 답</div>
    <div class="cell"><strong>몇 시간 자율 실행</strong></div>

    <div class="cell label">분업</div>
    <div class="cell">Stage 0~1</div>
    <div class="cell"><strong>Stage 2 · 여러 에이전트</strong></div>
  </div>

  <div class="closing"><strong>ChatGPT가 나쁜 게 아니다.</strong> 단발 질문엔 그게 맞다. OS 환경엔 도구가 받쳐줘야 한다.</div>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Day 1 · I11 라이브 데모</title>
<link rel="stylesheet" href="./assets/warm-neutral.css">
<style>
  body { display: flex; flex-direction: column; }
  .lead { font-size: 13pt; line-height: 1.6; color: #42332a; margin-top: 20pt; max-width: 620pt; }
  .lead strong { color: #b45a34; font-weight: 700; }
  .demo { flex: 1; margin-top: 18pt; display: grid; grid-template-columns: 1fr; align-content: center; gap: 14pt; }
  .term { background: #2b2520; border-radius: 10pt; padding: 22pt 24pt; display: flex; flex-direction: column; gap: 12pt; }
  .term .lbl { font-size: 8.5pt; letter-spacing: 0.22em; font-weight: 700; color: #ffd9bf; text-transform: uppercase; }
  .term .cmd { font-family: 'SF Mono', 'Menlo', monospace; font-size: 15pt; color: #fff; letter-spacing: -0.01em; display: flex; align-items: center; gap: 8pt; }
  .term .cmd .prompt { color: #ffd9bf; }
  .term .cmd .cur { width: 8pt; height: 16pt; background: #c56a4a; display: inline-block; border-radius: 1pt; }
  .term .note { font-size: 11pt; color: #f5e4d4; line-height: 1.5; }
  .closing { padding: 11pt 16pt; background: #ebe1d2; border-left: 3px solid #c56a4a; border-radius: 6pt; font-size: 12pt; line-height: 1.5; color: #2b2520; font-weight: 600; }
  .closing strong { color: #b45a34; }
</style>
</head>
<body>
  <div class="eyebrow">개념은 여기까지</div>
  <div class="h-large">지금 — <em>다음 주 실제 미팅 하나로</em></div>
  <div class="rule"></div>

  <div class="lead">말로만 하면 안 와닿는다. <strong>슬라이드를 끄고</strong>, 지금 캘린더에 잡힌 미팅 하나를 이 자리에서 준비해 본다. 데모는 슬라이드가 아니라 터미널에서.</div>

  <div class="demo">
    <div class="term">
      <div class="lbl">Live · 터미널로 전환</div>
      <div class="cmd"><span class="prompt">claude &gt;</span> 다음 주 이 미팅 콜 프렙 만들어줘 <span class="cur"></span></div>
      <div class="note">맥락 0에서 시작해도 구조가 나온다. 4일 뒤엔 여기에 내 도구가 붙은 버전이 된다.</div>
    </div>
    <div class="closing"><strong>지금 보는 건 시작점이다.</strong> "이 정도까지 되네"를 눈으로 확인하고 본편으로 들어간다.</div>
  </div>
</body>
</html>

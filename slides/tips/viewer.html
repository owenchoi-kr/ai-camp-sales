<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Camp · Sales — 꿀팁 모음 (12장)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #111; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  .viewer-container { width: 100%; height: 100%; display: flex; flex-direction: column; }
  .nav-bar { height: 48px; background: #1a1a1a; border-bottom: 1px solid #333; display: flex; align-items: center; justify-content: center; gap: 16px; flex-shrink: 0; z-index: 100; position: relative; }
  .nav-bar button { background: #333; color: #fff; border: none; border-radius: 6px; padding: 6px 16px; font-size: 13px; font-family: inherit; cursor: pointer; transition: background 0.15s; }
  .nav-bar button:hover { background: #555; }
  .nav-bar button:disabled { opacity: 0.3; cursor: default; }
  .slide-counter { color: #aaa; font-size: 14px; font-weight: 500; min-width: 90px; text-align: center; font-variant-numeric: tabular-nums; }
  .btn-fullscreen { position: absolute; right: 16px; background: transparent !important; font-size: 18px; padding: 6px 10px !important; }
  .slide-viewport { flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; background: #111; }
  .slide-scaler { width: 720pt; height: 405pt; position: relative; transform-origin: center center; }
  .slide-frame { position: absolute; inset: 0; width: 720pt; height: 405pt; border: none; overflow: hidden; opacity: 0; pointer-events: none; transition: opacity 0.2s ease; background: #f5ede2; }
  .slide-frame.active { opacity: 1; pointer-events: auto; }
</style>
</head>
<body>
  <div class="viewer-container">
    <div class="nav-bar">
      <button id="btn-prev" title="Previous (←)">Prev</button>
      <span class="slide-counter" id="counter">1 / 12</span>
      <button id="btn-next" title="Next (→)">Next</button>
      <button class="btn-fullscreen" id="btn-fs" title="Fullscreen (F)">⛶</button>
    </div>
    <div class="slide-viewport">
      <div class="slide-scaler" id="scaler"></div>
    </div>
  </div>
<script>
const TOTAL = 12;
const scaler = document.getElementById('scaler');
const counter = document.getElementById('counter');
const btnPrev = document.getElementById('btn-prev');
const btnNext = document.getElementById('btn-next');
const btnFs = document.getElementById('btn-fs');
let current = 0;
const frames = [];

for (let i = 1; i <= TOTAL; i++) {
  const f = document.createElement('iframe');
  f.className = 'slide-frame';
  f.src = `slide-${String(i).padStart(2, '0')}.html`;
  scaler.appendChild(f);
  frames.push(f);
}

function showSlide(idx) {
  if (idx < 0 || idx >= TOTAL) return;
  frames[current]?.classList.remove('active');
  frames[idx].classList.add('active');
  current = idx;
  counter.textContent = `${idx + 1} / ${TOTAL}`;
  btnPrev.disabled = idx === 0;
  btnNext.disabled = idx === TOTAL - 1;
}

function fitScale() {
  const vp = document.querySelector('.slide-viewport').getBoundingClientRect();
  const scale = Math.min(vp.width / (720 * 1.333), vp.height / (405 * 1.333));
  scaler.style.transform = `scale(${scale})`;
}

btnPrev.onclick = () => showSlide(current - 1);
btnNext.onclick = () => showSlide(current + 1);
btnFs.onclick = () => { document.fullscreenElement ? document.exitFullscreen() : document.documentElement.requestFullscreen(); };
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') showSlide(current - 1);
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); showSlide(current + 1); }
  if (e.key.toLowerCase() === 'f') btnFs.onclick();
});
window.addEventListener('resize', fitScale);
fitScale();
showSlide(0);
</script>
</body>
</html>

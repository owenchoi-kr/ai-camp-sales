<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>꿀팁 9 · T10 도구 이름 박기</title>
<link rel="stylesheet" href="./assets/warm-neutral.css">
<style>
  body { display: flex; flex-direction: column; }
  .content { flex: 1; margin-top: 20pt; display: flex; flex-direction: column; justify-content: center; gap: 18pt; }
  .code { font-family: 'SF Mono', 'Menlo', monospace; font-size: 15pt; color: #fff; background: #2b2520; border-radius: 10pt; padding: 20pt 24pt; line-height: 1.5; align-self: flex-start; }
  .code .prompt { color: #f2cdb4; }
  .desc { font-size: 14pt; line-height: 1.6; color: #42332a; max-width: 620pt; }
  .desc strong { color: #b45a34; font-weight: 700; }
  .credit { font-size: 10.5pt; color: #a0917e; letter-spacing: 0.05em; border-top: 1px dashed #d4c4ac; padding-top: 8pt; margin-top: auto; }
</style>
</head>
<body>
  <div class="eyebrow">꿀팁 9 · 여러 도구에서 한 번에</div>
  <div class="h-large">도구 이름을 <em>박아준다</em></div>
  <div class="rule"></div>

  <div class="content">
    <div class="code"><span class="prompt">claude &gt;</span> Circleback·Notion·Slack에서 이 계정 이력 모아줘</div>
    <div class="desc">'Circleback·Notion·Slack에서 이 계정 이력 모아줘'처럼 도구 이름을 직접 넣으면, AI가 그 도구를 우선 불러온다. 각 도구에서 뭘 원하는지 한 줄씩 주면 <strong>결과가 예측 가능</strong>해진다.</div>
  </div>

  <div class="credit">— CSM 캠프</div>
</body>
</html>

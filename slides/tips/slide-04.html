<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>꿀팁 3 · T04 auto 모드</title>
<link rel="stylesheet" href="./assets/warm-neutral.css">
<style>
  body { display: flex; flex-direction: column; }
  .content { flex: 1; margin-top: 20pt; display: flex; flex-direction: column; justify-content: center; gap: 16pt; }
  .code { font-family: 'SF Mono', 'Menlo', monospace; font-size: 16pt; color: #fff; background: #2b2520; border-radius: 10pt; padding: 20pt 24pt; line-height: 1.5; }
  .code .prompt { color: #f2cdb4; }
  .code .sub { display: block; font-size: 12pt; color: #a0917e; margin-top: 10pt; }
  .code .sub em { font-style: normal; color: #f2cdb4; }
  .desc { font-size: 14pt; line-height: 1.6; color: #42332a; max-width: 600pt; }
  .credit { font-size: 10.5pt; color: #a0917e; letter-spacing: 0.05em; border-top: 1px dashed #d4c4ac; padding-top: 8pt; margin-top: auto; }
</style>
</head>
<body>
  <div class="eyebrow">꿀팁 3 · 편하게 맡기기</div>
  <div class="h-large"><em>auto</em> 모드</div>
  <div class="rule"></div>

  <div class="content">
    <div class="code"><span class="prompt">claude --enable-auto-mode</span><span class="sub"><em>shift-tab</em> 으로 모드 전환</span></div>
    <div class="desc">단, 실행하기 전에 뭘 하려는지 한 번 보는 습관은 유지한다.</div>
  </div>

  <div class="credit">— 최현종</div>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>꿀팁 · T01 Cover</title>
<link rel="stylesheet" href="./assets/warm-neutral.css">
<style>
  body { display: flex; flex-direction: column; justify-content: center; }
  .mark { display: flex; align-items: center; gap: 8pt; margin-bottom: 22pt; }
  .mark .dot { width: 10pt; height: 10pt; border-radius: 999pt; background: #c56a4a; }
  .mark .label { font-size: 10pt; letter-spacing: 0.3em; color: #b45a34; font-weight: 600; text-transform: uppercase; }
  .cover-title { font-size: 46pt; font-weight: 500; line-height: 1.1; letter-spacing: -0.015em; color: #2b2520; }
  .cover-title em { font-style: normal; color: #b45a34; }
  .subline { font-size: 14pt; color: #7d6b5a; font-family: 'SF Mono', 'Menlo', monospace; letter-spacing: -0.005em; border-top: 1px dashed #d4c4ac; padding-top: 12pt; margin-top: 22pt; display: inline-block; }
</style>
</head>
<body>
  <div class="mark"><span class="dot"></span><span class="label">AI Camp · 꿀팁</span></div>
  <div class="cover-title">동료들이 <em>실제로 쓰는</em> 것</div>
  <div><span class="subline">사내 #ai-camp 채널에서 모았습니다</span></div>
</body>
</html>

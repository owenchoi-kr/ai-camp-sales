<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Day 4 · 06 손에 남은 것</title>
<link rel="stylesheet" href="./assets/warm-neutral.css">
<style>
  body { display: flex; flex-direction: column; }
  .split { display: grid; grid-template-columns: 1.25fr 1fr; gap: 16pt; flex: 1; margin-top: 22pt; }
  .checklist { padding: 26pt 26pt; border-radius: 12pt; background: #ebe1d2; display: flex; flex-direction: column; justify-content: center; gap: 16pt; }
  .checklist .row { display: flex; align-items: center; gap: 12pt; }
  .checklist .mark { flex-shrink: 0; width: 24pt; height: 24pt; border-radius: 6pt; background: #c56a4a; color: #fff; font-size: 14pt; font-weight: 700; display: flex; align-items: center; justify-content: center; }
  .checklist .txt { font-size: 17pt; font-weight: 700; color: #2b2520; }
  .cta { padding: 26pt 26pt; border-radius: 12pt; background: #c56a4a; color: #f7efe4; display: flex; flex-direction: column; justify-content: center; gap: 12pt; }
  .cta .tag { font-size: 10.5pt; letter-spacing: 0.14em; font-weight: 700; color: #ffd9bf; text-transform: uppercase; }
  .cta .body { font-size: 19pt; font-weight: 700; color: #fff; line-height: 1.35; }
</style>
</head>
<body>
  <div class="eyebrow">1주차 끝</div>
  <div class="h-large">손에 남은 것</div>
  <div class="rule"></div>

  <div class="split">
    <div class="checklist">
      <div class="row"><span class="mark">✓</span><span class="txt">CLAUDE.md</span></div>
      <div class="row"><span class="mark">✓</span><span class="txt">my-account-sync</span></div>
      <div class="row"><span class="mark">✓</span><span class="txt">내 업무 스킬 1개</span></div>
      <div class="row"><span class="mark">✓</span><span class="txt">2주차 프로젝트 계획</span></div>
    </div>
    <div class="cta">
      <div class="tag">2주차</div>
      <div class="body">내 딜 하나에 적용 → 금요일 쇼케이스 (리더 참관)</div>
    </div>
  </div>
</body>
</html>

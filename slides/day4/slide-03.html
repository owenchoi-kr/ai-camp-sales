<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Day 4 · 03 세 가지 마음가짐</title>
<link rel="stylesheet" href="./assets/warm-neutral.css">
<style>
  body { display: flex; flex-direction: column; }
  .steps { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14pt; flex: 1; margin-top: 24pt; }
  .step { padding: 24pt 22pt; border-radius: 12pt; background: #ebe1d2; display: flex; flex-direction: column; gap: 14pt; }
  .step.terra { background: #c56a4a; color: #f7efe4; }
  .step .num { font-size: 9.5pt; letter-spacing: 0.22em; font-weight: 700; color: #a0917e; text-transform: uppercase; }
  .step.terra .num { color: #ffd9bf; }
  .step h3 { font-size: 18pt; font-weight: 700; color: #2b2520; line-height: 1.3; }
  .step.terra h3 { color: #fff; }
</style>
</head>
<body>
  <div class="eyebrow">AI로 쓰레기 만들지 않기</div>
  <div class="h-large">세 가지 마음가짐</div>
  <div class="rule"></div>

  <div class="steps">
    <div class="step terra">
      <div class="num">01</div>
      <h3>AI는 정답 기계가 아니라 초안 기계다</h3>
    </div>
    <div class="step">
      <div class="num">02</div>
      <h3>검증은 내 일이다</h3>
    </div>
    <div class="step">
      <div class="num">03</div>
      <h3>빈칸을 두려워 않는다</h3>
    </div>
  </div>
</body>
</html>
